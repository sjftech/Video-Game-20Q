<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Game 20 Questions (AI Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-yes { @apply border-green-500 text-green-500 bg-green-500/10; }
        .status-no { @apply border-red-500 text-red-500 bg-red-500/10; }
        .status-default { @apply border-gray-700 text-gray-500 bg-gray-900/50; }
        .status-thinking { @apply border-blue-500 text-blue-500 bg-blue-500/10 animate-pulse; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-black text-gray-100 min-h-screen flex flex-col items-center p-4 md:p-10 font-sans tracking-tight">

    <div class="w-full max-w-xl">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold uppercase italic tracking-tighter">AI Video Game 20 Questions</h1>
        </header>

        <div id="setup-screen" class="text-center py-12 bg-gray-900/50 rounded-3xl border border-gray-800 px-6">
            <div id="init-ui">
                <p class="text-sm text-gray-400 mb-6">This version uses an AI model running locally in your browser. The first load requires a ~2-4GB download.</p>
                <button onclick="initializeAI()" id="load-btn" class="bg-white text-black px-12 py-4 rounded-full font-bold text-lg hover:scale-105 transition-all">
                    LOAD AI ENGINE
                </button>
            </div>
            
            <div id="loading-bar-container" class="hidden space-y-4">
                <div class="w-full bg-gray-800 rounded-full h-4">
                    <div id="loading-bar-fill" class="bg-blue-600 h-4 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <p id="loading-status" class="text-xs text-gray-500 uppercase tracking-widest">Initializing WebGPU...</p>
            </div>
        </div>

        <main id="game-board" class="hidden">
            <div class="flex justify-between items-end mb-4 px-2">
                <div>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest text-blue-400">Attempts</p>
                    <p class="text-2xl font-mono"><span id="q-count">0</span><span class="text-gray-600">/20</span></p>
                </div>
                <div class="flex gap-4">
                    <button onclick="toggleHistory()" class="text-xs text-blue-400 hover:text-blue-300 uppercase font-bold tracking-widest">History</button>
                    <button onclick="location.reload()" class="text-xs text-gray-500 hover:text-white uppercase font-bold tracking-widest">Reset</button>
                </div>
            </div>

            <div id="display-box" class="h-40 flex flex-col items-center justify-center rounded-2xl border-2 border-dashed mb-8 transition-all duration-300 status-default px-6 text-center">
                <span id="display-text" class="text-5xl font-black uppercase tracking-tighter">Ready</span>
                <span id="detected-intent" class="text-[10px] mt-4 opacity-60 uppercase tracking-widest">Ask anything (Setting, Vibe, Theme...)</span>
            </div>

            <div id="history-panel" class="hidden bg-gray-900 border border-gray-800 rounded-xl p-4 mb-6 max-h-48 overflow-y-auto">
                <ul id="history-list" class="text-sm space-y-1"></ul>
            </div>

            <div class="space-y-6">
                <div class="flex gap-2">
                    <input type="text" id="question-input" 
                        onkeypress="if(event.key === 'Enter') handleAIQuestion()"
                        placeholder="e.g. 'Is it Sci-Fi?' or 'Is it a dark game?'" 
                        class="flex-1 bg-gray-900 border border-gray-800 rounded-xl p-4 text-sm focus:outline-none focus:border-white">
                    <button id="ask-btn" onclick="handleAIQuestion()" class="bg-white text-black px-6 rounded-xl font-bold text-sm uppercase">Ask</button>
                </div>

                <div class="pt-4 border-t border-gray-800">
                    <div class="flex gap-2">
                        <input type="text" id="guess-input" 
                            onkeypress="if(event.key === 'Enter') submitGuess()"
                            placeholder="Guess the game..." 
                            class="flex-1 bg-gray-900 border border-gray-800 rounded-xl p-4 text-sm focus:outline-none focus:border-blue-500">
                        <button onclick="submitGuess()" class="bg-blue-600 text-white px-6 rounded-xl font-bold text-sm uppercase tracking-widest">Solve</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const RAWG_KEY = 'cb76f55aa533491883169019a274e4c6'; // <--- PUT YOUR KEY HERE
        let engine;
        let secretGame = null;
        let questionsUsed = 0;

        // Global functions for the buttons
        window.initializeAI = async () => {
            document.getElementById('init-ui').classList.add('hidden');
            document.getElementById('loading-bar-container').classList.remove('hidden');

            const statusLabel = document.getElementById('loading-status');
            const bar = document.getElementById('loading-bar-fill');

            const selectedModel = "Qwen2.5-1.5B-Instruct-q4f16_1-MLC"; // Efficient small model

            engine = await webllm.CreateMLCEngine(selectedModel, {
                initProgressCallback: (report) => {
                    const progress = Math.round(report.progress * 100);
                    bar.style.width = progress + "%";
                    statusLabel.innerText = report.text;
                }
            });

            await prepareGame();
        };

        async function prepareGame() {
            try {
                const randomPage = Math.floor(Math.random() * 30) + 1;
                const response = await fetch(`https://api.rawg.io/api/games?key=${RAWG_KEY}&page_size=40&page=${randomPage}&ordering=-added`);
                const data = await response.json();
                secretGame = data.results[Math.floor(Math.random() * data.results.length)];
                
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('game-board').classList.remove('hidden');
                console.log("Secret Answer: " + secretGame.name);
            } catch (e) {
                alert("RAWG API Error. Check your key.");
            }
        }

        window.handleAIQuestion = async () => {
            const input = document.getElementById('question-input');
            const btn = document.getElementById('ask-btn');
            const query = input.value.trim();
            if (!query || questionsUsed >= 20 || btn.disabled) return;

            // UI State: Thinking
            btn.disabled = true;
            input.disabled = true;
            updateDisplay('thinking', 'AI is analyzing game data...');

            // Prepare Game Data for AI
            const gameContext = {
                name: secretGame.name,
                genres: secretGame.genres.map(g => g.name),
                tags: secretGame.tags.map(t => t.name),
                platforms: secretGame.platforms.map(p => p.platform.name),
                released: secretGame.released,
                rating: secretGame.metacritic
            };

            const messages = [
                { role: "system", content: "You are a 20 Questions game judge. I will provide game details. You must answer ONLY with 'Yes' or 'No'. If you are unsure, answer 'No'." },
                { role: "user", content: `Secret Game Data: ${JSON.stringify(gameContext)}. Question: ${query}` }
            ];

            try {
                const reply = await engine.chat.completions.create({ messages });
                const answerRaw = reply.choices[0].message.content.trim().toLowerCase();
                const isTrue = answerRaw.includes("yes");

                questionsUsed++;
                document.getElementById('q-count').innerText = questionsUsed;
                
                // Add to history
                const li = document.createElement('li');
                li.className = isTrue ? "text-green-400" : "text-red-400";
                li.innerHTML = `<span class="text-gray-600">Q${questionsUsed}:</span> ${query} <b>(${isTrue ? 'YES' : 'NO'})</b>`;
                document.getElementById('history-list').prepend(li);

                updateDisplay(isTrue ? 'yes' : 'no', `AI judged your question against ${secretGame.name}`);
            } catch (err) {
                updateDisplay('confused', 'AI Engine Error.');
            } finally {
                btn.disabled = false;
                input.disabled = false;
                input.value = "";
            }
        };

        window.updateDisplay = (state, intent) => {
            const box = document.getElementById('display-box');
            const txt = document.getElementById('display-text');
            const sub = document.getElementById('detected-intent');
            sub.innerText = intent;

            box.className = "h-40 flex flex-col items-center justify-center rounded-2xl border-2 border-dashed mb-8 transition-all duration-300 px-6 text-center";
            
            if (state === 'thinking') {
                txt.innerText = "...";
                box.classList.add('status-thinking');
            } else if (state === 'yes') {
                txt.innerText = "Yes";
                box.classList.add('status-yes');
            } else if (state === 'no') {
                txt.innerText = "No";
                box.classList.add('status-no');
            } else {
                txt.innerText = "???";
                box.classList.add('status-confused');
            }
        };

        window.submitGuess = () => {
            const input = document.getElementById('guess-input').value.trim().toLowerCase();
            if (input === secretGame.name.toLowerCase()) {
                alert("WINNER! The game was " + secretGame.name);
                location.reload();
            } else {
                alert("Wrong!");
            }
        };

        window.toggleHistory = () => {
            document.getElementById('history-panel').classList.toggle('hidden');
        };
    </script>
</body>
</html>
