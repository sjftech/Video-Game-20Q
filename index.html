<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Game 20 Questions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-yes { @apply border-green-500 text-green-500 bg-green-500/10; }
        .status-no { @apply border-red-500 text-red-500 bg-red-500/10; }
        .status-default { @apply border-gray-700 text-gray-500 bg-gray-900/50; }
        .status-confused { @apply border-yellow-600 text-yellow-600 bg-yellow-600/10; }
    </style>
</head>
<body class="bg-black text-gray-100 min-h-screen flex flex-col items-center p-4 md:p-10 font-sans tracking-tight">

    <div class="w-full max-w-xl">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold uppercase italic tracking-tighter">Video Game 20 Questions</h1>
        </header>

        <div id="start-screen" class="text-center py-20 bg-gray-900/50 rounded-3xl border border-gray-800">
            <button onclick="setupGame()" id="fetch-btn" class="bg-white text-black px-12 py-4 rounded-full font-bold text-lg hover:scale-105 transition-transform active:scale-95">
                START NEW GAME
            </button>
            <p id="loading-msg" class="hidden mt-4 text-gray-500 animate-pulse uppercase text-xs tracking-widest">Accessing Database...</p>
        </div>

        <main id="game-board" class="hidden">
            <div class="flex justify-between items-end mb-4 px-2">
                <div>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">Attempts</p>
                    <p class="text-2xl font-mono"><span id="q-count">0</span><span class="text-gray-600">/20</span></p>
                </div>
                <button onclick="location.reload()" class="text-xs text-gray-500 hover:text-white transition-colors">ABANDON</button>
            </div>

            <div id="display-box" class="h-40 flex flex-col items-center justify-center rounded-2xl border-2 border-dashed mb-8 transition-all duration-300 status-default px-6">
                <span id="display-text" class="text-5xl font-black uppercase tracking-tighter text-center">Ready</span>
                <span id="detected-intent" class="text-[10px] mt-4 opacity-60 uppercase tracking-widest text-center">Type a question and press Enter</span>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase tracking-widest ml-2 mb-2 block">Ask something about genre, platform, or style</label>
                    <div class="flex gap-2">
                        <input type="text" id="question-input" 
                            onkeypress="if(event.key === 'Enter') processQuestion()"
                            placeholder="e.g. 'Is it open world?' or 'Is it 2D?'" 
                            class="flex-1 bg-gray-900 border border-gray-800 rounded-xl p-4 text-sm focus:outline-none focus:border-white transition-colors">
                        <button onclick="processQuestion()" class="bg-white text-black px-6 rounded-xl font-bold text-sm hover:bg-gray-200 transition-colors uppercase">Ask</button>
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-800">
                    <div class="flex gap-2">
                        <input type="text" id="guess-input" 
                            onkeypress="if(event.key === 'Enter') submitGuess()"
                            placeholder="Type the full game title..." 
                            class="flex-1 bg-gray-900 border border-gray-800 rounded-xl p-4 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                        <button onclick="submitGuess()" class="bg-blue-600 text-white px-6 rounded-xl font-bold text-sm hover:bg-blue-500 transition-colors uppercase tracking-widest">Solve</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_KEY = 'cb76f55aa533491883169019a274e4c6';
        let secretGame = null;
        let questionsUsed = 0;

        async function setupGame() {
            document.getElementById('fetch-btn').classList.add('hidden');
            document.getElementById('loading-msg').classList.remove('hidden');
            try {
                // Fetching from a wide pool of popular games
                const randomPage = Math.floor(Math.random() * 25) + 1;
                const response = await fetch(`https://api.rawg.io/api/games?key=${API_KEY}&page_size=40&page=${randomPage}&ordering=-added`);
                const data = await response.json();
                secretGame = data.results[Math.floor(Math.random() * data.results.length)];
                
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('game-board').classList.remove('hidden');
                console.log("Secret Answer: " + secretGame.name);
            } catch (err) {
                alert("Check your API key!");
                location.reload();
            }
        }

        function processQuestion() {
            const input = document.getElementById('question-input');
            const query = input.value.toLowerCase().trim();
            if (!query || questionsUsed >= 20) return;

            questionsUsed++;
            document.getElementById('q-count').innerText = questionsUsed;
            input.value = ""; 

            let isTrue = false;
            let intentMsg = "";
            let recognized = true;

            const tags = secretGame.tags ? secretGame.tags.map(t => t.slug) : [];
            const genres = secretGame.genres.map(g => g.slug);
            const platforms = secretGame.platforms.map(p => p.platform.name.toLowerCase());

            // 1. OPEN WORLD
            if (query.includes("open world") || query.includes("sandbox")) {
                intentMsg = "Checking if Open World...";
                isTrue = tags.includes('open-world') || tags.includes('sandbox');
            }
            // 2. COUCH CO-OP / LOCAL MULTIPLAYER
            else if (query.includes("couch") || query.includes("local") || query.includes("split screen")) {
                intentMsg = "Checking for Local Multiplayer...";
                isTrue = tags.some(t => t.includes('local-multiplayer') || t.includes('split-screen') || t.includes('local-co-op'));
            }
            // 3. 2D vs 3D
            else if (query.includes("2d") || query.includes("two dimensional")) {
                intentMsg = "Checking if 2D...";
                isTrue = tags.includes('2d') || tags.includes('side-scroller');
            }
            else if (query.includes("3d") || query.includes("three dimensional")) {
                intentMsg = "Checking if 3D...";
                // Logic: If it's not tagged 2D and has 3D identifiers
                isTrue = tags.includes('3d') || tags.includes('first-person') || tags.includes('third-person');
            }
            // 4. JAPANESE DEVELOPER (The most common country query)
            else if (query.includes("japan") || query.includes("japanese")) {
                intentMsg = "Checking if Japanese Developer...";
                // Note: We check tags as RAWG often tags "japanese-game"
                isTrue = tags.includes('japanese-game') || tags.includes('jrpg');
            }
            // 5. GENRES (Fighting, RPG, etc)
            else if (query.includes("fighting")) {
                intentMsg = "Genre: Fighting?";
                isTrue = genres.includes('fighting');
            }
            else if (query.includes("shooter") || query.includes("fps")) {
                intentMsg = "Genre: Shooter?";
                isTrue = genres.includes('shooter') || tags.includes('fps');
            }
            else if (query.includes("rpg") || query.includes("role playing")) {
                intentMsg = "Genre: RPG?";
                isTrue = genres.includes('role-playing');
            }
            // 6. EXCLUSIVITY
            else if (query.includes("exclusive") || query.includes("only on")) {
                const brands = ['nintendo', 'playstation', 'xbox', 'pc'];
                let target = brands.find(b => query.includes(b));
                if (target) {
                    intentMsg = `Only on ${target}?`;
                    isTrue = platforms.every(p => p.includes(target) || p.includes('ios') || p.includes('android'));
                } else {
                    isTrue = secretGame.platforms.length === 1;
                }
            }
            else { recognized = false; }

            updateDisplay(recognized ? isTrue : null, recognized ? intentMsg : "I didn't recognize that. Try 'Open World', '2D', or 'Couch Co-op'.");
        }

        function updateDisplay(isTrue, intent) {
            const box = document.getElementById('display-box');
            const txt = document.getElementById('display-text');
            const sub = document.getElementById('detected-intent');
            sub.innerText = intent;
            if (isTrue === null) {
                txt.innerText = "???";
                box.className = `h-40 flex flex-col items-center justify-center rounded-2xl border-2 border-dashed mb-8 transition-all duration-300 status-confused px-6`;
            } else {
                txt.innerText = isTrue ? "Yes" : "No";
                box.className = `h-40 flex flex-col items-center justify-center rounded-2xl border-2 border-dashed mb-8 transition-all duration-300 ${isTrue ? 'status-yes' : 'status-no'} px-6`;
            }
        }

        function submitGuess() {
            const input = document.getElementById('guess-input').value.trim().toLowerCase();
            const solution = secretGame.name.toLowerCase();
            if (input === solution) {
                alert("CORRECT! It was " + secretGame.name);
                location.reload();
            } else {
                alert("Nope! Try another guess.");
            }
        }
    </script>
</body>
</html>
