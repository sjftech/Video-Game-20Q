<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Scoop! 20 Questions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8 font-sans">
    <div class="max-w-2xl mx-auto text-center">
        <h1 class="text-4xl font-bold mb-4 text-yellow-400">Game Scoop 20 Questions</h1>
        <p class="mb-8 italic text-slate-400">"The only video game podcast you need... in game form!"</p>

        <div id="game-container" class="bg-slate-800 p-6 rounded-xl shadow-2xl border border-slate-700">
            <div id="intro-screen">
                <button onclick="startGame()" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 px-8 rounded-full transition-all">
                    Pick a Random Game
                </button>
            </div>

            <div id="play-screen" class="hidden">
                <div class="flex justify-between mb-4">
                    <span class="text-lg">Questions Asked: <b id="count">0</b>/20</span>
                    <button onclick="location.reload()" class="text-xs text-slate-400 hover:text-white underline">Restart</button>
                </div>
                
                <div id="answer-box" class="h-24 flex items-center justify-center text-3xl font-bold mb-6 border-b border-slate-700">
                    Waiting for a question...
                </div>

                <div class="grid grid-cols-2 gap-2 text-sm">
                    <button onclick="ask('genre', 'Action')" class="bg-slate-700 p-2 rounded hover:bg-slate-600">Is it Action?</button>
                    <button onclick="ask('genre', 'RPG')" class="bg-slate-700 p-2 rounded hover:bg-slate-600">Is it an RPG?</button>
                    <button onclick="ask('year', 2010)" class="bg-slate-700 p-2 rounded hover:bg-slate-600">Was it after 2010?</button>
                    <button onclick="ask('platform', 'PlayStation')" class="bg-slate-700 p-2 rounded hover:bg-slate-600">Is it on PlayStation?</button>
                    <button onclick="ask('platform', 'Nintendo')" class="bg-slate-700 p-2 rounded hover:bg-slate-600">Is it on Nintendo?</button>
                    <button onclick="ask('meta', '90')" class="bg-slate-700 p-2 rounded hover:bg-slate-600">Metacritic 90+?</button>
                </div>

                <div class="mt-8 border-t border-slate-700 pt-6">
                    <input id="guess-input" type="text" placeholder="Type your guess..." class="bg-slate-900 border border-slate-600 p-2 rounded w-full mb-2 text-center">
                    <button onclick="checkGuess()" class="w-full bg-green-600 hover:bg-green-700 font-bold py-2 rounded">GUESS!</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'YOUR_API_KEY_HERE'; // PASTE YOUR KEY HERE
        let targetGame = null;
        let questionsAsked = 0;

        async function startGame() {
            // Fetch random popular games (page 1-10 of top games)
            const randPage = Math.floor(Math.random() * 10) + 1;
            const response = await fetch(`https://api.rawg.io/api/games?key=${API_KEY}&page=${randPage}&page_size=20&ordering=-added`);
            const data = await response.json();
            
            // Pick a random game from those 20
            targetGame = data.results[Math.floor(Math.random() * data.results.length)];
            
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('play-screen').classList.remove('hidden');
            console.log("Cheater! The game is: ", targetGame.name);
        }

        function ask(type, val) {
            if (questionsAsked >= 20) return alert("Out of questions!");
            
            questionsAsked++;
            document.getElementById('count').innerText = questionsAsked;
            let answer = "NO";

            if (type === 'genre') {
                if (targetGame.genres.some(g => g.name.includes(val))) answer = "YES!";
            } else if (type === 'platform') {
                if (targetGame.platforms.some(p => p.platform.name.includes(val))) answer = "YES!";
            } else if (type === 'year') {
                const year = parseInt(targetGame.released.split('-')[0]);
                if (year > val) answer = "YES!";
            } else if (type === 'meta') {
                if (targetGame.metacritic >= 90) answer = "YES!";
            }

            const box = document.getElementById('answer-box');
            box.innerText = answer;
            box.className = `h-24 flex items-center justify-center text-3xl font-bold mb-6 border-b border-slate-700 ${answer === 'YES!' ? 'text-green-400' : 'text-red-400'}`;
        }

        function checkGuess() {
            const guess = document.getElementById('guess-input').value.toLowerCase();
            if (guess === targetGame.name.toLowerCase()) {
                alert("YOU WIN! It was " + targetGame.name);
                location.reload();
            } else {
                alert("Nope! Try again.");
            }
        }
    </script>
</body>
</html>
