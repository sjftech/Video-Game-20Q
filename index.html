<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Video Game 20 Questions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            background-color: black;
        }
        .status-yes { @apply border-green-500 text-green-500 bg-green-500/10; }
        .status-no { @apply border-red-500 text-red-500 bg-red-500/10; }
        .status-thinking { @apply border-blue-500 text-blue-500 bg-blue-500/10 animate-pulse; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        main { transition: height 0.2s ease-in-out; }
    </style>
</head>
<body class="text-gray-100 font-sans">

    <div id="overlay-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/95 backdrop-blur-md p-6">
        <div id="modal-content" class="bg-gray-900 border border-gray-800 rounded-3xl p-8 max-w-sm w-full text-center">
            <h2 id="modal-status" class="text-4xl font-black mb-2 uppercase italic">STATUS</h2>
            <p id="modal-msg" class="text-gray-400 mb-6 uppercase text-[10px] tracking-widest font-bold">Target Intel</p>
            <div id="modal-title" class="text-2xl font-bold mb-8 text-white underline decoration-blue-500">Game Name</div>
            <button onclick="location.reload()" class="w-full bg-white text-black py-4 rounded-xl font-bold uppercase">New Game</button>
        </div>
    </div>

    <div id="setup-screen" class="fixed inset-0 z-40 bg-black flex flex-col items-center justify-center p-10 text-center">
        <h1 class="text-2xl font-black uppercase italic mb-8 tracking-tighter italic">Video Game 20 Questions</h1>
        <div class="w-full max-w-xs bg-gray-800 h-1.5 rounded-full overflow-hidden mb-4">
            <div id="loading-bar-fill" class="bg-blue-500 h-full w-0 transition-all"></div>
        </div>
        <p id="loading-status" class="text-[10px] text-gray-500 uppercase font-mono">Connecting to Neural Engine...</p>
    </div>

    <header class="p-4 border-b border-gray-900 flex justify-between items-center bg-black shrink-0">
        <h1 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500">20Q System</h1>
        <div class="flex items-center gap-4">
            <span class="text-blue-500 font-mono text-sm font-bold"><span id="q-count">20</span> Left</span>
            <button onclick="handleGiveUp()" class="text-[9px] font-bold text-red-500 uppercase border border-red-900 px-2 py-1 rounded">Give Up</button>
        </div>
    </header>

    <main class="flex-1 flex flex-col overflow-hidden">
        <div class="p-4 shrink-0">
            <div id="display-box" class="h-20 flex flex-col items-center justify-center rounded-2xl border-2 border-dashed border-gray-800 text-center transition-all">
                <span id="display-text" class="text-3xl font-black uppercase tracking-tighter">READY</span>
                <span id="detected-intent" class="text-[9px] mt-1 opacity-40 uppercase tracking-widest italic">Awaiting Input</span>
            </div>
        </div>

        <div class="flex-1 overflow-hidden flex flex-col px-4">
            <p class="text-[10px] text-gray-600 uppercase tracking-widest mb-2 font-black border-l-2 border-blue-600 pl-2 italic">Question History</p>
            <div id="memory-log" class="flex-1 overflow-y-auto custom-scroll flex flex-col gap-2 pb-4">
                </div>
        </div>
    </main>

    <footer class="p-4 bg-gray-950 border-t border-gray-900 shrink-0">
        <form id="game-form" onsubmit="event.preventDefault(); processInput();" class="flex gap-2">
            <input type="text" id="unified-input" 
                placeholder="Ask or guess..." 
                autocomplete="off"
                spellcheck="true"
                class="flex-1 bg-black border border-gray-800 rounded-xl p-4 text-sm text-blue-400 font-bold focus:border-blue-500">
            <button type="submit" class="bg-white text-black px-6 rounded-xl font-bold text-xs uppercase active:bg-blue-500">Send</button>
        </form>
    </footer>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const RAWG_KEY = 'cb76f55aa533491883169019a274e4c6'; 
        let engine;
        let secretGame = null;
        let wikiContext = "";
        let attemptsRemaining = 20;

        window.addEventListener('DOMContentLoaded', initializeAI);

        async function initializeAI() {
            try {
                engine = await webllm.CreateMLCEngine("Qwen2.5-0.5B-Instruct-q4f16_1-MLC", {
                    initProgressCallback: (r) => {
                        document.getElementById('loading-bar-fill').style.width = (r.progress * 100) + "%";
                        document.getElementById('loading-status').innerText = r.text;
                    }
                });
                await prepareGame();
            } catch (e) { document.getElementById('loading-status').innerText = "WebGPU Fail."; }
        }

        async function prepareGame() {
            const res = await fetch(`https://api.rawg.io/api/games?key=${RAWG_KEY}&page_size=40&page=${Math.floor(Math.random()*40)+1}&ordering=-added`);
            const data = await res.json();
            secretGame = data.results[Math.floor(Math.random() * data.results.length)];
            
            // DLC / Title Cleaning for Wikipedia
            let cleanTitle = secretGame.name
                .split(':')[0]           // Remove Subtitles
                .split(' - ')[0]         // Remove dashes
                .replace(/DLC|Expansion|Pack|Season Pass/gi, '') 
                .trim();

            try {
                const wRes = await fetch(`https://en.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&titles=${encodeURIComponent(cleanTitle)}&format=json&origin=*`);
                const wData = await wRes.json();
                const pages = wData.query.pages;
                wikiContext = pages[Object.keys(pages)[0]].extract || "";
            } catch (e) { wikiContext = "No wiki found."; }

            document.getElementById('setup-screen').classList.add('hidden');
            console.log("Secret: " + secretGame.name + " | Wiki Search: " + cleanTitle);
        }

        window.processInput = async () => {
            const input = document.getElementById('unified-input');
            const val = input.value.trim();
            if (!val || attemptsRemaining <= 0) return;

            const lowerVal = val.toLowerCase();
            const solution = secretGame.name.toLowerCase();

            if (lowerVal === solution || (solution.includes(lowerVal) && lowerVal.length > 3)) {
                showModal("VICTORY", "Target Identified", "border-green-500", "text-green-500");
                return;
            }

            const qWords = ["IS", "WAS", "DOES", "CAN", "HAS", "DID", "ARE", "YEAR", "GENRE", "SETTING", "RELEASE", "MADE"];
            const isQ = qWords.some(w => val.toUpperCase().includes(w)) || val.includes('?');

            if (!isQ && val.split(' ').length < 3) {
                attemptsRemaining--;
                addLogItem(val, false);
                updateDisplay('no', 'Incorrect Guess');
                input.value = "";
                checkLoss();
                return;
            }

            await handleAIQuestion(val);
            input.value = "";
        };

        async function handleAIQuestion(query) {
            updateDisplay('thinking', 'Factual Verification...');
            
            const officialContext = `
                GAME NAME: ${secretGame.name}
                WIKIPEDIA SUMMARY: ${wikiContext.substring(0, 1000)}
                GENRES: ${secretGame.genres.map(g=>g.name).join(', ')}
                TAGS: ${secretGame.tags.slice(0, 5).map(t=>t.name).join(', ')}
            `;

            const messages = [
                { 
                    role: "system", 
                    content: `You are a factual Yes/No judge for a guessing game. 
                    - Only use the provided context.
                    - If the user asks about developer, genre, or year, check the context carefully.
                    - If the data contradicts the user's question, say NO.
                    - Answer ONLY 'Yes' or 'No'. Never provide explanations.` 
                },
                { role: "user", content: `Context: ${officialContext}\n\nQuestion: ${query}` }
            ];

            const reply = await engine.chat.completions.create({ 
                messages, 
                temperature: 0.0 // Strict logic
            });

            const responseText = reply.choices[0].message.content.trim().toLowerCase();
            const isTrue = responseText.includes("yes");

            attemptsRemaining--;
            addLogItem(query, isTrue);
            updateDisplay(isTrue ? 'yes' : 'no', isTrue ? 'Affirmative' : 'Negative');
            checkLoss();
        }

        function addLogItem(q, res) {
            const log = document.getElementById('memory-log');
            const item = document.createElement('div');
            item.className = `p-3 rounded-lg border ${res ? 'border-green-900/50 bg-green-950/10 text-green-400' : 'border-red-900/50 bg-red-950/10 text-red-400'}`;
            item.innerHTML = `<div class="flex justify-between items-center"><span class="text-[10px] font-bold uppercase truncate pr-2">${q}</span><span class="text-[10px] font-black">${res?'YES':'NO'}</span></div>`;
            log.prepend(item);
            document.getElementById('q-count').innerText = attemptsRemaining;
        }

        function checkLoss() {
            if (attemptsRemaining <= 0) showModal("DEFEAT", "Attempts Depleted", "border-red-500", "text-red-500");
        }

        window.handleGiveUp = () => showModal("REVEALED", "Mission Aborted", "border-yellow-600", "text-yellow-600");

        function showModal(st, msg, bc, tc) {
            const modal = document.getElementById('overlay-modal');
            document.getElementById('modal-status').innerText = st;
            document.getElementById('modal-status').className = `text-4xl font-black mb-2 uppercase italic ${tc}`;
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('modal-title').innerText = secretGame.name;
            document.getElementById('modal-content').className = `bg-gray-900 border ${bc} rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl`;
            modal.style.display = 'flex';
        }

        window.updateDisplay = (state, intent) => {
            const box = document.getElementById('display-box');
            const txt = document.getElementById('display-text');
            document.getElementById('detected-intent').innerText = intent;
            box.className = "h-20 flex flex-col items-center justify-center rounded-2xl border-2 border-dashed mb-4 transition-all px-6 text-center";
            if (state === 'thinking') { txt.innerText = "..."; box.classList.add('status-thinking'); }
            else if (state === 'yes') { txt.innerText = "YES"; box.classList.add('status-yes'); }
            else if (state === 'no') { txt.innerText = "NO"; box.classList.add('status-no'); }
            else { txt.innerText = "GO"; box.classList.add('border-gray-800'); }
        };
    </script>
</body>
</html>
